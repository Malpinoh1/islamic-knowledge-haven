<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daawatulhaqq — Islamic Digital Library</title>
    <meta name="description" content="Explore thousands of authentic Islamic books in Arabic and English. Free to download from Daawatulhaqq digital library." />
    <meta property="og:title" content="Daawatulhaqq — Islamic Digital Library" />
    <meta property="og:description" content="Your gateway to Islamic knowledge. Browse and download authentic Islamic books for free." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://daawatulhaqq.com.ng" />
    <link rel="canonical" href="https://daawatulhaqq.com.ng" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Daawatulhaqq",
      "url": "https://daawatulhaqq.com.ng",
      "description": "A free digital library dedicated to preserving and sharing Islamic knowledge.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://daawatulhaqq.com.ng/books?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
